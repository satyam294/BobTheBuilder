<!DOCTYPE html>

<script>
    const arr = [1,2,3,4]
    doubleArray(arr);

    function doubleArray(nums){
        const doubleArr = [];
        for(let num of nums){
            doubleArr.push(num * 2);
        }
        console.log(doubleArr);
    }

    const A2 = [1, 2, 3, 4, 5];
    const [first, second, third] = A2;  //destructuring

    console.log(first);

    const A3 = A2.slice();  //copy of the array object

    function isPrime(n){
        if(n <= 1) return false;
        for(let i = 2; i <= Math.sqrt(n); i++){
            if(n % i == 0) return false;
        }
        return true;
    }

    console.log(isPrime(9));

    //functions

    //no hoisting(accessing before creation) for this syntax
    const f1 = function (){         //dont need a function name as long as we store it somewhere
        console.log('Hello there');
    }
    f1();
    console.log(typeof f1);

    //hoisting allowed for this syntax only: since it is equivalent of using var for storing function
    f2();
    function f2(){
        console.log("I allow hoisting");
    }
    
</script>
</html>
