<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays</title>
</head>
<body>
    
</body>
<script>
    const arr = [1,2,3,4]
    doubleArray(arr);

    function doubleArray(nums){
        const doubleArr = [];
        for(let num of nums){
            doubleArr.push(num * 2);
        }
        console.log(doubleArr);
    }

    const A2 = [1, 2, 3, 4, 5];
    const [first, second, third] = A2;  //destructuring

    console.log(first);

    const A3 = A2.slice();  //copy of the array object

    function isPrime(n){
        if(n <= 1) return false;
        for(let i = 2; i <= Math.sqrt(n); i++){
            if(n % i == 0) return false;
        }
        return true;
    }

    console.log(isPrime(9));

    //functions

    //no hoisting(accessing before creation) for this syntax
    const f1 = function (){         //anonymous fn: dont need a function name as long as we store it somewhere
        console.log('Hello there');
    }
    f1();
    console.log(typeof f1);

    //hoisting allowed for this syntax only: since it is equivalent of using var for storing function
    f2();
    function f2(){
        console.log("I allow hoisting");
    }

    //saving inside objects
    const obj1 = {
        num: 2,
        fun: function(){           //method: function inside an object
            console.log("Hello 3");
        }
    }
    obj1.fun();

    //functions with parameter
    function display(param){
        console.log(param);
    }
    display('what a day man');

    //function inside function
    function run(param){         //functions passed inside a function is a: CALLBACK!!!!!!
        param();
    }

    run(function() {
        console.log('i am inside');
    })


    //settimeout() : asynchronous

    setTimeout(function() {
        console.log("i ran after timeout");
        console.log("Everything inside me runs synchronously");  //inside: line by line
    }, 3000);

    //anything after setTimeout() runs without wait
    console.log("See i ran first")

    //same as setTimeout - inside content runs after every interval
    //the code that follows runs normally
    setInterval(function(){
        console.log('After every 3 sec');
    }, 3000);

    
</script>
</html>
