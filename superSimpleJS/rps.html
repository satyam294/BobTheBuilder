<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <p>Pick Your Move</p>
    <button onclick=" playGame('rock')" id="rock">
        Rock
    </button>
    <button onclick="playGame('paper')" id="paper">
        Paper
    </button>
    <button onclick="playGame('scissors')" id="scissors">
        Scissors
    </button>

    <button onclick = "
        score.win = 0;
        score.loss = 0;
        score.tie = 0; 
        localStorage.removeItem('score');  //remove the stored score
    ">
        Reset Score
    </button>

    <h2 id='cmove'>Computer Move</h2>
    <h2 id = 'results'>Results</h2>
    <h2 id = 'scorecard'>ScoreCard</h2>

<script>
    //fetch the score object from the localStorage
    const score = JSON.parse(localStorage.getItem('score')) ||
                {
                    win: 0,
                    loss: 0,
                    tie: 0
                };  //default operator

    function playGame(move){

        const random = Math.random();

        const cmove = document.querySelector("#cmove");
        const res = document.querySelector("#results");
        const scorecard = document.querySelector('#scorecard');

        let computerChoice = '';

        if(random < 1/3){
            computerChoice = 'rock';
        }
        else if(random < 2/3){
            computerChoice = 'paper';
        }
        else{
            computerChoice = 'scissors';
        }

        cmove.innerHTML = `Computer Played: ${computerChoice}`;

        if(move === computerChoice){
            score.tie++;
            res.innerHTML = 'Round Tied';
        }
        else if(
            (move === 'rock' && computerChoice === 'scissors') ||
            (move === 'paper' && computerChoice === 'rock') ||
            (move === 'scissors' && computerChoice === 'paper')
        ){
            score.win++;
            res.innerHTML = 'You Won';
        }
        else{
            score.loss++;
            res.innerHTML = 'You Lost';
        }
        //save the scores to avoid losing info on refresh
        localStorage.setItem('score', JSON.stringify(score));

        scorecard.innerHTML = `Win: ${score.win} Loss: ${score.loss} Tie: ${score.tie}`;
        
    }
</script>

</body>

</html>
